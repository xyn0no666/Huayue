<style>
  .dashboard { max-width:1100px; margin:0 auto; padding:calc(var(--header-height) + var(--space-5)) var(--space-3) var(--space-10) }
  .dashboard h1 { font-family:var(--font-heading); margin-bottom:var(--space-1) }
  .dashboard-subtitle { color:var(--color-text-muted); font-size:0.875rem; margin-bottom:var(--space-5) }
  .dboard-tabs { display:flex; gap:0; margin-bottom:var(--space-4); border-bottom:2px solid var(--color-border) }
  .dboard-tab { padding:12px 28px; font-size:0.875rem; font-weight:500; color:var(--color-text-light); background:none; border:none; cursor:pointer; position:relative; transition:color var(--transition-fast) }
  .dboard-tab:hover { color:var(--color-text) }
  .dboard-tab--active { color:var(--color-text); font-weight:600 }
  .dboard-tab--active::after { content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--color-gold);transform:scaleX(1) }
  .dboard-tab .count { display:inline-block;background:var(--color-gold);color:#fff;font-size:0.625rem;padding:1px 7px;border-radius:10px;margin-left:6px;font-weight:700 }
  .dboard-panel { display:none }
  .dboard-panel--active { display:block;animation:fadeIn 0.3s ease }
  .dboard-toolbar { display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-3) }
  .dboard-toolbar .btn { font-size:0.75rem }
  .entry-card { background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3);margin-bottom:var(--space-2);transition:all var(--transition-fast) }
  .entry-card:hover { border-color:var(--color-gold) }
  .entry-card__header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-2) }
  .entry-card__type { font-size:0.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-gold-dark);background:rgba(196,169,125,0.1);padding:3px 10px;border-radius:3px }
  .entry-card__date { font-size:0.6875rem;color:var(--color-text-muted);font-family:var(--font-mono) }
  .entry-card__text { font-size:0.875rem;color:var(--color-text);line-height:1.8;margin-bottom:var(--space-1) }
  .entry-card__stars { color:var(--color-gold);margin-bottom:var(--space-1);font-size:1rem }
  .entry-card__fields { display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;font-size:0.8125rem;margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px solid var(--color-border) }
  .entry-card__fields dt { color:var(--color-text-muted);font-size:0.6875rem;text-transform:uppercase;letter-spacing:0.04em }
  .entry-card__fields dd { color:var(--color-text-light);margin-bottom:6px }
  .empty-state { text-align:center;padding:var(--space-10) var(--space-3);color:var(--color-text-muted) }
  .empty-state svg { width:48px;height:48px;stroke:var(--color-border);margin-bottom:var(--space-2) }
  .empty-state p { font-size:0.875rem }
  @media (max-width:767px) {
    .entry-card__fields { grid-template-columns:1fr }
    .dboard-tabs { overflow-x:auto;-webkit-overflow-scrolling:touch }
    .dboard-tab { white-space:nowrap;padding:12px 16px }
  }
</style>
</head>

<script>
(function(){'use strict';

  var staticTestimonials = (window.APP_DATA && window.APP_DATA.testimonials) || [];

  /* === Render === */
  function renderTestimonials(){
    var container = document.getElementById('testimonialList');
    var userSubs = JSON.parse(localStorage.getItem('huayue-testimonials') || '[]');
    // Static ones
    var html = '';
    staticTestimonials.forEach(function(t){
      html += '<div class="entry-card">'+
        '<div class="entry-card__header"><span class="entry-card__type">静态评价</span><span class="entry-card__date">'+t.name+'</span></div>'+
        '<div class="entry-card__stars">'+'★'.repeat(t.rating)+'</div>'+
        '<div class="entry-card__text">"'+t.text+'"</div>'+
      '</div>';
    });
    // User-submitted ones
    userSubs.slice().reverse().forEach(function(s){
      html += '<div class="entry-card">'+
        '<div class="entry-card__header"><span class="entry-card__type">用户提交</span><span class="entry-card__date">'+new Date(s.date).toLocaleString('zh-CN')+'</span></div>'+
        '<div class="entry-card__stars">'+(s.rating?'★'.repeat(s.rating):'未评分')+'</div>'+
        '<div class="entry-card__text">"'+s.text+'"</div>'+
      '</div>';
    });
    if(!html) html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>暂无评价数据</p></div>';
    container.innerHTML = html;
    document.getElementById('countTestimonials').textContent = staticTestimonials.length + userSubs.length;
  }

  function renderInquiries(){
    var container = document.getElementById('inquiryList');
    var subs = JSON.parse(localStorage.getItem('huayue-inquiries') || '[]');
    var html = '';
    subs.slice().reverse().forEach(function(s){
      var fieldsHTML = '';
      if(s.fields){
        fieldsHTML = '<dl class="entry-card__fields">';
        Object.keys(s.fields).forEach(function(k){
          fieldsHTML += '<dt>'+k+'</dt><dd>'+s.fields[k]+'</dd>';
        });
        fieldsHTML += '</dl>';
      }
      html += '<div class="entry-card">'+
        '<div class="entry-card__header"><span class="entry-card__type">'+s.type+'</span><span class="entry-card__date">'+new Date(s.date).toLocaleString('zh-CN')+'</span></div>'+
        fieldsHTML+
      '</div>';
    });
    if(!html) html = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z"/></svg><p>暂无询盘记录<br><small>联系页面的表单提交后将在此显示</small></p></div>';
    container.innerHTML = html;
    document.getElementById('countInquiries').textContent = subs.length;
    document.getElementById('inquirySummary').textContent = '共 ' + subs.length + ' 条询盘记录';
  }

  /* === Tabs === */
  function initTabs(){
    document.querySelectorAll('.dboard-tab').forEach(function(btn){
      btn.addEventListener('click',function(){
        var tab = this.getAttribute('data-dtab');
        document.querySelectorAll('.dboard-tab').forEach(function(b){b.classList.remove('dboard-tab--active')});
        this.classList.add('dboard-tab--active');
        document.querySelectorAll('.dboard-panel').forEach(function(p){p.classList.toggle('dboard-panel--active', p.id === 'panel-' + tab)});
      });
    });
  }

  /* === Clear buttons === */
  function initClear(){
    var clearT = document.getElementById('clearTestimonials');
    var clearI = document.getElementById('clearInquiries');
    if(clearT) clearT.addEventListener('click',function(){
      if(!confirm('确定清除所有用户提交的评价？')) return;
      localStorage.removeItem('huayue-testimonials');
      renderTestimonials();
    });
    if(clearI) clearI.addEventListener('click',function(){
      if(!confirm('确定清除全部询盘记录？此操作不可撤销。')) return;
      localStorage.removeItem('huayue-inquiries');
      renderInquiries();
    });
  }

  function init(){
    renderTestimonials();
    renderInquiries();
    initTabs();
    initClear();
  }

  if(document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); }
  else { init(); }
})();
</script>
