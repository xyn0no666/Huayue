<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const C = document.getElementById('c');

/* ================================================================
   RENDERER
   ================================================================ */
const R = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
R.setPixelRatio(Math.min(devicePixelRatio, 2));
R.setSize(innerWidth, innerHeight);
R.shadowMap.enabled = true;
R.shadowMap.type = THREE.PCFSoftShadowMap;
R.toneMapping = THREE.ACESFilmicToneMapping;
R.toneMappingExposure = 1.1;
R.outputColorSpace = THREE.SRGBColorSpace;
C.appendChild(R.domElement);

/* ================================================================
   SCENE + CAMERA
   ================================================================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1c1a16');
scene.fog = new THREE.Fog('#1c1a16', 4, 16);

const cam = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 50);
cam.position.set(2.6, 1.4, 3.8);
const ctrl = new OrbitControls(cam, R.domElement);
ctrl.target.set(0, 0.12, 0.4);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.08;
ctrl.minDistance = 2; ctrl.maxDistance = 7;
ctrl.maxPolarAngle = Math.PI * 0.72;
ctrl.autoRotate = true; ctrl.autoRotateSpeed = 1.0;
ctrl.update();

/* ================================================================
   ENVIRONMENT MAP (simulated photo studio)
   ================================================================ */
const pmrem = new THREE.PMREMGenerator(R);
pmrem.compileEquirectangularShader();
const eS = new THREE.Scene(); eS.background = new THREE.Color('#e0ddd6');
[
  { pos:[0,8,0], rot:[-Math.PI/2,0,0], size:[10,10], color:'#ffffff' },
  { pos:[6,3,-2], rot:[0,0.5,0], size:[8,8], color:'#ffe8d0' },
  { pos:[-5,2,-1], rot:[0,-0.5,0], size:[7,7], color:'#d0d8ff' },
  { pos:[3,1,4], rot:[0,1.2,0], size:[6,6], color:'#fff8f0' },
  { pos:[0,-4,0], rot:[Math.PI/2,0,0], size:[10,10], color:'#2a2520' },
].forEach(l => {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(...l.size), new THREE.MeshBasicMaterial({ color:l.color, side:THREE.DoubleSide }));
  m.position.set(...l.pos); m.rotation.set(...l.rot); eS.add(m);
});
scene.environment = pmrem.fromScene(eS, 0.04).texture;
scene.environmentIntensity = 1.1;
pmrem.dispose();

/* ================================================================
   LIGHTING - Professional 3-point + accents
   ================================================================ */
scene.add(new THREE.AmbientLight('#d0d8e8', 0.8));
const key = new THREE.DirectionalLight('#fffaf0', 6);
key.position.set(5, 7, 4); key.castShadow = true;
key.shadow.mapSize.width = 2048; key.shadow.mapSize.height = 2048;
key.shadow.camera.near = 0.5; key.shadow.camera.far = 30;
key.shadow.camera.left = -8; key.shadow.camera.right = 8;
key.shadow.camera.top = 6; key.shadow.camera.bottom = -3;
key.shadow.bias = -0.00006; key.shadow.normalBias = 0.02; key.shadow.radius = 1;
scene.add(key);
const fill = new THREE.DirectionalLight('#d0dcff', 2.2);
fill.position.set(-4, 2.5, 1); scene.add(fill);
const rim = new THREE.DirectionalLight('#ffffff', 3.5);
rim.position.set(0, 3, -5); scene.add(rim);
const bounce = new THREE.DirectionalLight('#ffe8d0', 1.5);
bounce.position.set(0, -0.5, 3); scene.add(bounce);

/* ================================================================
   GROUND + SHADOW CATCHER
   ================================================================ */
const gn = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), new THREE.ShadowMaterial({ opacity: 0.25 }));
gn.rotation.x = -Math.PI / 2; gn.position.y = -1.8; gn.receiveShadow = true; scene.add(gn);
const pt = new THREE.Mesh(
  new THREE.CylinderGeometry(1.1, 1.15, 0.06, 64),
  new THREE.MeshStandardMaterial({ color: '#2a2520', roughness: 0.45, metalness: 0.35 })
);
pt.position.y = -1.78; pt.receiveShadow = true; pt.castShadow = true; scene.add(pt);

/* ================================================================
   MATERIALS - PBR
   ================================================================ */
const MO = new THREE.MeshStandardMaterial({ color: '#e86a2c', roughness: 0.28, metalness: 0.06 });
const MOD = new THREE.MeshStandardMaterial({ color: '#cc5518', roughness: 0.32, metalness: 0.06 });
const MW = new THREE.MeshStandardMaterial({ color: '#f2ede4', roughness: 0.26, metalness: 0.04 });
const MWD = new THREE.MeshStandardMaterial({ color: '#e6ded2', roughness: 0.30, metalness: 0.04 });
const MB = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.35, metalness: 0.1 });
const MBR = new THREE.MeshStandardMaterial({ color: '#252525', roughness: 0.55, metalness: 0.06 });
const MG = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.72, metalness: 0.0 });
const MM = new THREE.MeshStandardMaterial({ color: '#d8d8d8', roughness: 0.16, metalness: 0.95 });
const MMD = new THREE.MeshStandardMaterial({ color: '#888888', roughness: 0.20, metalness: 0.9 });
const MBAR = new THREE.MeshStandardMaterial({ color: '#dcdcdc', roughness: 0.12, metalness: 0.95 });
const MCH = new THREE.MeshStandardMaterial({ color: '#3a3a3a', roughness: 0.28, metalness: 0.82 });
const MMUFF = new THREE.MeshStandardMaterial({ color: '#5a5a5a', roughness: 0.33, metalness: 0.78 });
const MRED = new THREE.MeshStandardMaterial({ color: '#cc3322', roughness: 0.24, metalness: 0.04 });

/* ================================================================
   GEOMETRY BUILDERS (like 3ds Max modeling tools)
   ================================================================ */

// Extrude a 2D shape profile into 3D (like 3ds Max Extrude modifier)
function extrudeShape(points, depth, bevel = 0.015, bevelSteps = 3) {
  const shape = new THREE.Shape();
  shape.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) shape.lineTo(points[i][0], points[i][1]);
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelThickness: bevel, bevelSize: bevel, bevelSegments: bevelSteps, steps: 1 });
  geo.computeVertexNormals();
  return geo;
}

// Lathe/revolve a profile around Y axis (like 3ds Max Lathe modifier)
function latheShape(points, segments = 48) {
  const vecs = points.map(p => new THREE.Vector2(p[0], p[1]));
  const geo = new THREE.LatheGeometry(vecs, segments);
  geo.computeVertexNormals();
  return geo;
}

// Tube along a curve path (like 3ds Max Sweep/Loft)
function tubePath(curvePoints, radius, tubularSegments = 64, radiusSegments = 24) {
  const curve = new THREE.CatmullRomCurve3(curvePoints.map(p => new THREE.Vector3(...p)));
  const geo = new THREE.TubeGeometry(curve, tubularSegments, radius, radiusSegments, false);
  geo.computeVertexNormals();
  return geo;
}

// Rounded box via ExtrudeGeometry (beveled edges)
function roundedBox(w, h, d, bevel = 0.04, bevelSteps = 4) {
  const hw = w / 2, hh = h / 2;
  const r = bevel * 2;
  const shape = new THREE.Shape();
  // Rounded rectangle profile
  shape.moveTo(-hw + r, -hh);
  shape.lineTo(hw - r, -hh);
  shape.quadraticCurveTo(hw, -hh, hw, -hh + r);
  shape.lineTo(hw, hh - r);
  shape.quadraticCurveTo(hw, hh, hw - r, hh);
  shape.lineTo(-hw + r, hh);
  shape.quadraticCurveTo(-hw, hh, -hw, hh - r);
  shape.lineTo(-hw, -hh + r);
  shape.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: d, bevelThickness: bevel, bevelSize: bevel, bevelSegments: bevelSteps, steps: 1 });
  geo.computeVertexNormals();
  return geo;
}

/* ================================================================
   BUILD THE CHAINSAW (like modeling in 3ds Max)
   ================================================================ */
const saw = new THREE.Group();

// ── GUIDE BAR ──────────────────────────────────
// Long profile with rounded ends, extruded thin
const barLen = 2.3;
const barProfile = [
  [-0.065, -barLen/2 + 0.07],
  [0.065, -barLen/2 + 0.07],
  [0.065, barLen/2 - 0.07],
  [0.04, barLen/2 - 0.02],
  [0.02, barLen/2],
  [-0.02, barLen/2],
  [-0.04, barLen/2 - 0.02],
  [-0.065, barLen/2 - 0.07],
];
const barGeo = extrudeShape(barProfile, 0.014, 0.004, 3);
const barMesh = new THREE.Mesh(barGeo, MBAR);
barMesh.rotation.x = Math.PI / 2;
barMesh.position.set(0, 0.12, 1.4);
barMesh.castShadow = true; barMesh.receiveShadow = true;
saw.add(barMesh);

// Bar nose sprocket
const sprocketGeo = new THREE.TorusGeometry(0.026, 0.008, 12, 24);
const sprocket = new THREE.Mesh(sprocketGeo, MMD);
sprocket.position.set(0, 0.12, 2.55); sprocket.castShadow = true;
saw.add(sprocket);

// Bar studs
for (let z of [0.16, 0.28]) {
  const studGeo = new THREE.CylinderGeometry(0.014, 0.014, 0.026, 20);
  const stud = new THREE.Mesh(studGeo, MMD);
  stud.position.set(0, 0.12, z); stud.rotation.x = Math.PI / 2; stud.castShadow = true;
  saw.add(stud);
}

// ── CHAIN ──────────────────────────────────────
// Chain as separate strips on top and bottom of bar
for (let s = 0; s < 2; s++) {
  const yOff = s === 0 ? 0.131 : 0.109;
  const chainStripGeo = roundedBox(0.14, 0.008, 2.08, 0.002, 2);
  const chainStrip = new THREE.Mesh(chainStripGeo, MCH);
  chainStrip.position.set(0, yOff, 1.36); chainStrip.castShadow = true;
  saw.add(chainStrip);
}
// Nose chain
const ncGeo = new THREE.TorusGeometry(0.065, 0.008, 8, 24, Math.PI);
const nc = new THREE.Mesh(ncGeo, MCH);
nc.position.set(0, 0.12, 2.55); nc.rotation.x = Math.PI / 2;
saw.add(nc);

// Chain cutters (teeth on top)
for (let z = 0.35; z < 2.35; z += 0.09) {
  const ctGeo = roundedBox(0.142, 0.01, 0.018, 0.003, 2);
  const ct = new THREE.Mesh(ctGeo, MM);
  ct.position.set(0, 0.141, z); ct.rotation.x = 0.1; ct.castShadow = true;
  saw.add(ct);
}

// ── BUCKING SPIKES ─────────────────────────────
const spikeBaseGeo = roundedBox(0.12, 0.04, 0.025, 0.005, 2);
const spikeBase = new THREE.Mesh(spikeBaseGeo, MM);
spikeBase.position.set(0, 0.06, 0.24); spikeBase.castShadow = true;
saw.add(spikeBase);

for (let i = 0; i < 3; i++) {
  const spikeGeo = new THREE.ConeGeometry(0.01, 0.06, 6, 4);
  const spike = new THREE.Mesh(spikeGeo, MM);
  spike.position.set(0, 0.01 - i * 0.02, 0.27); spike.rotation.x = -0.4; spike.castShadow = true;
  saw.add(spike);
}

// ── CRANKCASE (body base) ──────────────────────
const crankGeo = roundedBox(0.44, 0.24, 0.46, 0.035, 5);
const crank = new THREE.Mesh(crankGeo, MO);
crank.position.set(0, -0.04, -0.15); crank.castShadow = true; crank.receiveShadow = true;
saw.add(crank);

// ── CYLINDER ───────────────────────────────────
const cylGeo = roundedBox(0.33, 0.18, 0.34, 0.03, 5);
const cyl = new THREE.Mesh(cylGeo, MO);
cyl.position.set(0, 0.16, -0.15); cyl.castShadow = true; cyl.receiveShadow = true;
saw.add(cyl);

// Cylinder head plate
const chGeo = roundedBox(0.35, 0.035, 0.36, 0.008, 3);
const ch = new THREE.Mesh(chGeo, MOD);
ch.position.set(0, 0.27, -0.15); ch.castShadow = true;
saw.add(ch);

// Cooling fins
for (let i = 0; i < 6; i++) {
  const fGeo = roundedBox(0.37, 0.014, 0.38, 0.003, 3);
  const f = new THREE.Mesh(fGeo, MMD);
  f.position.set(0, 0.06 + i * 0.04, -0.15); f.castShadow = true;
  saw.add(f);
}

// ── TOP COVER ──────────────────────────────────
const tcGeo = roundedBox(0.32, 0.06, 0.28, 0.018, 4);
const tc = new THREE.Mesh(tcGeo, MW);
tc.position.set(0, 0.33, -0.2); tc.castShadow = true;
saw.add(tc);

// Cover vent ridges
for (let i = 0; i < 4; i++) {
  const rGeo = roundedBox(0.31, 0.006, 0.012, 0.002, 2);
  const ridge = new THREE.Mesh(rGeo, MWD);
  ridge.position.set(0, 0.37, -0.1 - i * 0.065); ridge.castShadow = true;
  saw.add(ridge);
}

// ── SPARK PLUG ─────────────────────────────────
const plugBodyGeo = latheShape([
  [0.02, -0.04], [0.026, -0.03], [0.028, -0.01], [0.028, 0.03], [0.022, 0.04], [0.02, 0.04]
], 24);
const plugBody = new THREE.Mesh(plugBodyGeo, MW);
plugBody.position.set(0.1, 0.35, -0.15); plugBody.castShadow = true;
saw.add(plugBody);

const plugBootGeo = new THREE.CylinderGeometry(0.03, 0.02, 0.035, 16);
const plugBootMesh = new THREE.Mesh(plugBootGeo, MB);
plugBootMesh.position.set(0.1, 0.4, -0.15);
saw.add(plugBootMesh);

// ── STARTER HOUSING (left, white) ──────────────
const starterGroup = new THREE.Group();

// Main disc - using lathe for smooth circular profile
const starterDiscGeo = latheShape([
  [0.16, -0.02], [0.17, 0], [0.17, 0.02], [0.16, 0.04], [0.10, 0.04], [0.10, 0.02]
], 48);
const starterDisc = new THREE.Mesh(starterDiscGeo, MW);
starterDisc.rotation.z = Math.PI / 2;
starterDisc.position.set(-0.27, 0.16, -0.15); starterDisc.castShadow = true;
starterGroup.add(starterDisc);

// Center hub
const hubGeo = latheShape([
  [0.05, -0.025], [0.058, 0], [0.058, 0.025], [0.05, 0.05], [0.03, 0.05]
], 36);
const hub = new THREE.Mesh(hubGeo, MB);
hub.rotation.z = Math.PI / 2;
hub.position.set(-0.31, 0.16, -0.15); hub.castShadow = true;
starterGroup.add(hub);

// Pull handle
const pullGeo = new THREE.CylinderGeometry(0.022, 0.026, 0.045, 20);
const pull = new THREE.Mesh(pullGeo, MB);
pull.rotation.z = Math.PI / 2;
pull.position.set(-0.35, 0.16, -0.15);
starterGroup.add(pull);

saw.add(starterGroup);

// ── CLUTCH COVER (right, orange) ───────────────
const ccGeo = roundedBox(0.05, 0.21, 0.38, 0.012, 4);
const cc = new THREE.Mesh(ccGeo, MO);
cc.position.set(0.26, 0.05, -0.15); cc.castShadow = true;
saw.add(cc);

// Clutch emboss
const embGeo = latheShape([
  [0.08, -0.002], [0.09, 0], [0.09, 0.002], [0.08, 0.004], [0.04, 0.004]
], 36);

// ── MUFFLER ────────────────────────────────────
const muffGroup = new THREE.Group();

const muffGeo = roundedBox(0.09, 0.12, 0.14, 0.018, 4);

const exGeo = new THREE.CylinderGeometry(0.022, 0.028, 0.03, 20);

ex.rotation.x = Math.PI / 2; ex.position.set(0.19, 0.11, -0.33);

// Muffler bolts
for (let y of [0.06, 0.16]) {

}

saw.add(muffGroup);

// ── TOP HANDLE (tube along curve) ──────────────
const handlePath = [
  [0, 0.52, 0.12],
  [0, 0.53, 0.06],
  [0, 0.52, 0],
  [0, 0.49, -0.06],
  [0, 0.44, -0.12],
  [0, 0.38, -0.2],
  [0, 0.36, -0.28],
];
const hTubeGeo = tubePath(handlePath, 0.026, 80, 20);
const hTube = new THREE.Mesh(hTubeGeo, MB);
hTube.castShadow = true;
saw.add(hTube);

// Grip section (thicker)
const gripPath = [
  [0, 0.53, 0.1],
  [0, 0.53, 0.04],
  [0, 0.52, -0.02],
];
const gripTubeGeo = tubePath(gripPath, 0.034, 32, 24);
const gripTube = new THREE.Mesh(gripTubeGeo, MG);
gripTube.castShadow = true;
saw.add(gripTube);

// Handle brace
const bracePath = [[0, 0.44, -0.04], [0, 0.52, -0.02]];
const braceGeo = tubePath(bracePath, 0.016, 16, 12);
const brace = new THREE.Mesh(braceGeo, MB);
saw.add(brace);

// ── FRONT HAND GUARD ───────────────────────────
const guardPath = [[0, 0.4, 0.2], [0, 0.36, 0.15], [0, 0.32, 0.08]];
const guardTubeGeo = tubePath(guardPath, 0.024, 32, 16);
const guardTube = new THREE.Mesh(guardTubeGeo, MB);
guardTube.castShadow = true;
saw.add(guardTube);

// Guard plate
const gpGeo = roundedBox(0.08, 0.14, 0.022, 0.01, 3);
const gp = new THREE.Mesh(gpGeo, MO);
gp.position.set(0, 0.28, 0.2); gp.castShadow = true;
saw.add(gp);

// ── REAR HANDLE ────────────────────────────────
const rhGeo = roundedBox(0.09, 0.13, 0.22, 0.025, 6);
const rh = new THREE.Mesh(rhGeo, MB);
rh.position.set(0, -0.13, -0.42); rh.castShadow = true;
saw.add(rh);

// Grip wrap
const rgGeo = roundedBox(0.10, 0.12, 0.19, 0.022, 5);
const rg = new THREE.Mesh(rgGeo, MG);
rg.position.set(0, -0.13, -0.44); rg.castShadow = true;

// Connector to body
const rconGeo = roundedBox(0.07, 0.06, 0.08, 0.012, 3);

// ── THROTTLE ───────────────────────────────────
const tgGeo = new THREE.TorusGeometry(0.055, 0.01, 8, 24, Math.PI);
const tg = new THREE.Mesh(tgGeo, MMD);
tg.position.set(0, -0.11, -0.55); tg.castShadow = true;
saw.add(tg);

const trigGeo = roundedBox(0.016, 0.044, 0.024, 0.005, 3);
const trig = new THREE.Mesh(trigGeo, MRED);
trig.position.set(0, -0.09, -0.57); trig.castShadow = true;

// Safety lock

const lock = new THREE.Mesh(lockGeo, MB);

// ── FUEL CAP ───────────────────────────────────
const fuelCapGeo = latheShape([
  [0.035, 0], [0.04, 0.005], [0.04, 0.025], [0.036, 0.035], [0.028, 0.035], [0.028, 0.01]
], 36);

// ── OIL CAP ────────────────────────────────────
const oilCapGeo = latheShape([
  [0.03, 0], [0.035, 0.005], [0.035, 0.022], [0.031, 0.032], [0.024, 0.032], [0.024, 0.01]
], 36);
const oilCap = new THREE.Mesh(oilCapGeo, MW);
oilCap.position.set(-0.1, 0.36, -0.05); oilCap.castShadow = true;
saw.add(oilCap);

// ── CHAIN TENSIONER ────────────────────────────
const tensGeo = new THREE.CylinderGeometry(0.022, 0.028, 0.035, 24);
const tens = new THREE.Mesh(tensGeo, MW);
tens.rotation.z = Math.PI / 2;
tens.position.set(0.29, -0.01, 0.23); tens.castShadow = true;
saw.add(tens);

// ── ANTI-VIBRATION SPRINGS ─────────────────────
for (let z of [-0.33, -0.2]) {
  const svGeo = new THREE.CylinderGeometry(0.009, 0.009, 0.045, 12);

const swGeo = roundedBox(0.024, 0.014, 0.032, 0.004, 2);

scene.add(saw);

/* ================================================================
   ANIMATION
   ================================================================ */
function anim() { requestAnimationFrame(anim); ctrl.update(); R.render(scene, cam); }
anim();

/* ================================================================
   UI
   ================================================================ */
const ba = document.getElementById('ba'), rhEl = document.getElementById('rh');
ba.addEventListener('click', () => { ctrl.autoRotate = !ctrl.autoRotate; ba.classList.toggle('on', ctrl.autoRotate); });
let hDone = false;
C.addEventListener('pointerdown', () => { if (!hDone) { hDone = true; rhEl.style.opacity = '0'; setTimeout(() => rhEl.remove(), 600); } });
C.addEventListener('wheel', () => { if (!hDone) { hDone = true; rhEl.style.opacity = '0'; setTimeout(() => rhEl.remove(), 600); } });

function animCam(pos, tgt, dur = 800) {
  const sp = cam.position.clone(), st = ctrl.target.clone();
  const ep = new THREE.Vector3(...pos), et = new THREE.Vector3(...tgt), t0 = performance.now();
  (function s(t) { const e = Math.min((t - t0) / dur, 1), ee = e < .5 ? 2*e*e : -1 + (4 - 2*e)*e; cam.position.lerpVectors(sp, ep, ee); ctrl.target.lerpVectors(st, et, ee); ctrl.update(); if (e < 1) requestAnimationFrame(s); })(t0);
}

document.getElementById('bf').addEventListener('click', () => animCam([0, 0.3, 4.8], [0, 0.15, 0.8]));
document.getElementById('bs').addEventListener('click', () => animCam([4.2, 0.3, 0.0], [0, 0.15, 0.4]));
document.getElementById('bt').addEventListener('click', () => animCam([0, 5.0, 0.5], [0, 0.15, 0.4]));
document.getElementById('br').addEventListener('click', () => animCam([2.6, 1.4, 3.8], [0, 0.12, 0.4]));

addEventListener('keydown', e => { switch (e.key.toLowerCase()) { case 'f': document.getElementById('bf').click(); break; case 's': document.getElementById('bs').click(); break; case 't': document.getElementById('bt').click(); break; case 'r': document.getElementById('br').click(); break; case ' ': e.preventDefault(); ba.click(); break; } });
addEventListener('resize', () => { cam.aspect = innerWidth / innerHeight; cam.updateProjectionMatrix(); R.setSize(innerWidth, innerHeight); });
C.addEventListener('touchstart', () => C.classList.add('grabbing'), { passive: true });
C.addEventListener('touchend', () => C.classList.remove('grabbing'), { passive: true });

console.log('🪚 油锯 3D — ExtrudeGeometry + LatheGeometry + TubeGeometry 建模');
</script>
