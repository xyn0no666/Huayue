<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const C = document.getElementById('c');

/* ================================================================
   RENDERER
   ================================================================ */
const R = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
R.setPixelRatio(Math.min(devicePixelRatio, 2));
R.setSize(innerWidth, innerHeight);
R.shadowMap.enabled = true;
R.shadowMap.type = THREE.PCFSoftShadowMap;
R.toneMapping = THREE.ACESFilmicToneMapping;
R.toneMappingExposure = 1.1;
R.outputColorSpace = THREE.SRGBColorSpace;
C.appendChild(R.domElement);

/* ================================================================
   SCENE + CAMERA
   ================================================================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1c1a16');
scene.fog = new THREE.Fog('#1c1a16', 3, 14);

const cam = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 50);
cam.position.set(2.4, 1.2, 3.6);
const ctrl = new OrbitControls(cam, R.domElement);
ctrl.target.set(0, 0.25, 0.6);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.08;
ctrl.minDistance = 1.8; ctrl.maxDistance = 7;
ctrl.maxPolarAngle = Math.PI * 0.72;
ctrl.autoRotate = true; ctrl.autoRotateSpeed = 1.0;
ctrl.update();

/* ================================================================
   ENVIRONMENT MAP
   ================================================================ */
const pmrem = new THREE.PMREMGenerator(R);
pmrem.compileEquirectangularShader();
const eS = new THREE.Scene(); eS.background = new THREE.Color('#e0ddd6');
[
  { pos:[0,8,0], rot:[-Math.PI/2,0,0], size:[10,10], color:'#ffffff' },
  { pos:[6,3,-2], rot:[0,0.5,0], size:[8,8], color:'#ffe8d0' },
  { pos:[-5,2,-1], rot:[0,-0.5,0], size:[7,7], color:'#d0d8ff' },
  { pos:[3,1,4], rot:[0,1.2,0], size:[6,6], color:'#fff8f0' },
  { pos:[0,-4,0], rot:[Math.PI/2,0,0], size:[10,10], color:'#2a2520' },
].forEach(l => {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(...l.size), new THREE.MeshBasicMaterial({ color:l.color, side:THREE.DoubleSide }));
  m.position.set(...l.pos); m.rotation.set(...l.rot); eS.add(m);
});
scene.environment = pmrem.fromScene(eS, 0.04).texture;
scene.environmentIntensity = 1.1;
pmrem.dispose();

/* ================================================================
   LIGHTING
   ================================================================ */
scene.add(new THREE.AmbientLight('#d0d8e8', 0.8));
const key = new THREE.DirectionalLight('#fffaf0', 6);
key.position.set(5, 7, 4); key.castShadow = true;
key.shadow.mapSize.width = 2048; key.shadow.mapSize.height = 2048;
key.shadow.camera.near = 0.5; key.shadow.camera.far = 30;
key.shadow.camera.left = -8; key.shadow.camera.right = 8;
key.shadow.camera.top = 6; key.shadow.camera.bottom = -2;
key.shadow.bias = -0.00006; key.shadow.normalBias = 0.02; key.shadow.radius = 1;
scene.add(key);
const fill = new THREE.DirectionalLight('#d0dcff', 2.2); fill.position.set(-4, 2.5, 1); scene.add(fill);
const rim = new THREE.DirectionalLight('#ffffff', 3.5); rim.position.set(0, 3, -5); scene.add(rim);
const bounce = new THREE.DirectionalLight('#ffe8d0', 1.5); bounce.position.set(0, -0.5, 3); scene.add(bounce);

/* ================================================================
   GROUND
   ================================================================ */
const gn = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), new THREE.ShadowMaterial({ opacity: 0.25 }));
gn.rotation.x = -Math.PI / 2; gn.position.y = -1.7; gn.receiveShadow = true; scene.add(gn);
const pt = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.05, 0.06, 64), new THREE.MeshStandardMaterial({ color: '#2a2520', roughness: 0.45, metalness: 0.35 }));
pt.position.y = -1.68; pt.receiveShadow = true; pt.castShadow = true; scene.add(pt);

/* ================================================================
   MATERIALS
   ================================================================ */
const MO = new THREE.MeshStandardMaterial({ color: '#e85d2c', roughness: 0.28, metalness: 0.06 });
const MOD = new THREE.MeshStandardMaterial({ color: '#c94a1f', roughness: 0.32, metalness: 0.06 });
const MW = new THREE.MeshStandardMaterial({ color: '#f2ede4', roughness: 0.26, metalness: 0.04 });
const MWD = new THREE.MeshStandardMaterial({ color: '#e6ded2', roughness: 0.30, metalness: 0.04 });
const MB = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.35, metalness: 0.1 });
const MBR = new THREE.MeshStandardMaterial({ color: '#252525', roughness: 0.55, metalness: 0.06 });
const MG = new THREE.MeshStandardMaterial({ color: '#1a1a1a', roughness: 0.72, metalness: 0.0 });
const MM = new THREE.MeshStandardMaterial({ color: '#c0c0c0', roughness: 0.16, metalness: 0.95 });
const MMD = new THREE.MeshStandardMaterial({ color: '#888888', roughness: 0.20, metalness: 0.9 });
const MMUFF = new THREE.MeshStandardMaterial({ color: '#5a5a5a', roughness: 0.33, metalness: 0.78 });
const MRED = new THREE.MeshStandardMaterial({ color: '#cc3322', roughness: 0.24, metalness: 0.04 });

/* ================================================================
   MODELING TOOLS (3ds Max-style)
   ================================================================ */
function extrudeShape(points, depth, bevel = 0.015, bevelSteps = 3) {
  const shape = new THREE.Shape();
  shape.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) shape.lineTo(points[i][0], points[i][1]);
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelThickness: bevel, bevelSize: bevel, bevelSegments: bevelSteps, steps: 1 });
  geo.computeVertexNormals();
  return geo;
}
function latheShape(points, segments = 48) {
  const geo = new THREE.LatheGeometry(points.map(p => new THREE.Vector2(p[0], p[1])), segments);
  geo.computeVertexNormals();
  return geo;
}
function tubePath(curvePoints, radius, segs = 64, rSegs = 24) {
  const curve = new THREE.CatmullRomCurve3(curvePoints.map(p => new THREE.Vector3(...p)));
  const geo = new THREE.TubeGeometry(curve, segs, radius, rSegs, false);
  geo.computeVertexNormals();
  return geo;
}
function roundedBox(w, h, d, bevel = 0.04, steps = 4) {
  const hw = w/2, hh = h/2, r = bevel*2;
  const shape = new THREE.Shape();
  shape.moveTo(-hw+r, -hh); shape.lineTo(hw-r, -hh); shape.quadraticCurveTo(hw, -hh, hw, -hh+r);
  shape.lineTo(hw, hh-r); shape.quadraticCurveTo(hw, hh, hw-r, hh);
  shape.lineTo(-hw+r, hh); shape.quadraticCurveTo(-hw, hh, -hw, hh-r);
  shape.lineTo(-hw, -hh+r); shape.quadraticCurveTo(-hw, -hh, -hw+r, -hh);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: d, bevelThickness: bevel, bevelSize: bevel, bevelSegments: steps, steps: 1 });
  geo.computeVertexNormals();
  return geo;
}

/* ================================================================
   BUILD THE BLOWER
   ================================================================ */
const blower = new THREE.Group();

// ── FAN VOLUTE (circular housing) ──────────────
// Using lathe for the volute spiral shape
const voluteGeo = latheShape([
  [0.54, -0.24], [0.57, -0.2], [0.58, 0], [0.58, 0.2], [0.57, 0.24], [0.54, 0.24]
], 64);
const volute = new THREE.Mesh(voluteGeo, MO);
volute.position.set(0, 0.35, 0); volute.castShadow = true; volute.receiveShadow = true;
blower.add(volute);

// Volute front ring
const vrGeo = new THREE.TorusGeometry(0.56, 0.032, 16, 64);
const vr = new THREE.Mesh(vrGeo, MMD);
vr.position.set(0, 0.35, 0.24); vr.castShadow = true;
blower.add(vr);

// Volute back ring
const vrbGeo = new THREE.TorusGeometry(0.56, 0.028, 12, 64);
const vrb = new THREE.Mesh(vrbGeo, MOD);
vrb.position.set(0, 0.35, -0.24); vrb.castShadow = true;
blower.add(vrb);

// Volute spiral bulge
const spiralGeo = latheShape([
  [0.05, -0.03], [0.07, 0], [0.07, 0.03], [0.05, 0.06], [0.02, 0.06]
], 32);
const spiral = new THREE.Mesh(spiralGeo, MOD);
spiral.position.set(0, 0.61, 0.12);
blower.add(spiral);

// ── ENGINE CYLINDER ────────────────────────────
const engGeo = roundedBox(0.50, 0.40, 0.50, 0.035, 5);
const eng = new THREE.Mesh(engGeo, MO);
eng.position.set(0, 0.80, -0.25); eng.castShadow = true; eng.receiveShadow = true;
blower.add(eng);

// Cylinder head
const headGeo = roundedBox(0.48, 0.09, 0.48, 0.012, 4);
const head = new THREE.Mesh(headGeo, MOD);
head.position.set(0, 1.07, -0.25); head.castShadow = true;
blower.add(head);

// Cooling fins
for (let i = 0; i < 6; i++) {
  const fGeo = roundedBox(0.55, 0.018, 0.55, 0.004, 3);
  const f = new THREE.Mesh(fGeo, MMD);
  f.position.set(0, 0.66 + i * 0.065, -0.25); f.castShadow = true;
  blower.add(f);
}

// Side panels
for (let x of [0.29, -0.29]) {
  const spGeo = roundedBox(0.06, 0.36, 0.46, 0.01, 3);
  const sp = new THREE.Mesh(spGeo, MOD);
  sp.position.set(x, 0.80, -0.25); sp.castShadow = true;
  blower.add(sp);
}

// ── STARTER (right side) ───────────────────────
const startDiscGeo = latheShape([
  [0.18, -0.02], [0.19, 0], [0.19, 0.02], [0.18, 0.035], [0.10, 0.035]
], 48);
const startDisc = new THREE.Mesh(startDiscGeo, MB);
startDisc.rotation.z = Math.PI / 2;
startDisc.position.set(0.34, 0.80, -0.25); startDisc.castShadow = true;
blower.add(startDisc);

const shGeo = latheShape([
  [0.06, -0.025], [0.068, 0], [0.068, 0.025], [0.055, 0.05], [0.03, 0.05]
], 36);
const sh = new THREE.Mesh(shGeo, MMD);
sh.rotation.z = Math.PI / 2;
sh.position.set(0.38, 0.80, -0.25); sh.castShadow = true;
blower.add(sh);

// Pull cord notch
const notchGeo = new THREE.TorusGeometry(0.045, 0.012, 8, 20);
const notch = new THREE.Mesh(notchGeo, MMD);
notch.position.set(0.38, 0.83, -0.25); notch.rotation.y = Math.PI / 2;
blower.add(notch);

// ── MUFFLER ────────────────────────────────────
const muffGeo = roundedBox(0.07, 0.15, 0.19, 0.018, 4);
const muff = new THREE.Mesh(muffGeo, MMUFF);
muff.position.set(-0.31, 0.69, -0.18); muff.castShadow = true;
blower.add(muff);

const msGeo = roundedBox(0.09, 0.17, 0.21, 0.006, 3);
const ms = new THREE.Mesh(msGeo, MMD);
ms.position.set(-0.35, 0.69, -0.18); ms.castShadow = true;
blower.add(ms);

// ── SPARK PLUG ─────────────────────────────────
const spGeo = latheShape([
  [0.022, -0.04], [0.028, -0.03], [0.03, 0], [0.03, 0.03], [0.024, 0.04], [0.02, 0.04]
], 24);
const sp = new THREE.Mesh(spGeo, MW);
sp.position.set(0.12, 1.17, -0.25); sp.castShadow = true;
blower.add(sp);

const spTopGeo = new THREE.CylinderGeometry(0.03, 0.024, 0.03, 16);
const spTop = new THREE.Mesh(spTopGeo, MMD);
spTop.position.set(0.12, 1.22, -0.25);
blower.add(spTop);

// ── FUEL TANK ──────────────────────────────────
const tankGeo = roundedBox(0.36, 0.13, 0.44, 0.03, 6);
const tank = new THREE.Mesh(tankGeo, MW);
tank.position.set(-0.03, 1.18, -0.28); tank.castShadow = true; tank.receiveShadow = true;
blower.add(tank);

// Fuel cap
const capGeo = latheShape([
  [0.05, 0], [0.058, 0.006], [0.058, 0.028], [0.052, 0.04], [0.04, 0.04], [0.04, 0.012]
], 36);
const cap = new THREE.Mesh(capGeo, MW);
cap.position.set(0.07, 1.28, -0.28); cap.castShadow = true;
blower.add(cap);

// ── AIR FILTER ─────────────────────────────────
const afGeo = roundedBox(0.40, 0.15, 0.12, 0.018, 4);
const af = new THREE.Mesh(afGeo, MBR);
af.position.set(0, 1.02, -0.52); af.castShadow = true;
blower.add(af);

const grGeo = roundedBox(0.36, 0.07, 0.014, 0.004, 2);
const gr = new THREE.Mesh(grGeo, MMD);
gr.position.set(0, 1.02, -0.59); gr.castShadow = true;
blower.add(gr);

// ── HANDLE (tube along curve) ──────────────────
const hPath = [
  [0, 1.08, 0.16],
  [0, 1.09, 0.08],
  [0, 1.08, 0.0],
  [0, 1.05, -0.08],
  [0, 0.98, -0.16],
  [0, 0.90, -0.22],
];
const hTubeGeo = tubePath(hPath, 0.028, 80, 20);
const hTube = new THREE.Mesh(hTubeGeo, MO);
hTube.castShadow = true;
blower.add(hTube);

// Grip rubber
const gripPath = [[0, 1.09, 0.14], [0, 1.09, 0.06], [0, 1.08, 0.0]];
const gripGeo = tubePath(gripPath, 0.036, 40, 24);
const grip = new THREE.Mesh(gripGeo, MG);
grip.castShadow = true;
blower.add(grip);

// ── THROTTLE ───────────────────────────────────
const tgGeo = new THREE.TorusGeometry(0.065, 0.01, 8, 24, Math.PI);
const tg = new THREE.Mesh(tgGeo, MMD);
tg.position.set(0, 0.97, 0.18); tg.castShadow = true;
blower.add(tg);

const trigGeo = roundedBox(0.015, 0.048, 0.028, 0.005, 3);
const trig = new THREE.Mesh(trigGeo, MRED);
trig.position.set(0, 0.96, 0.16); trig.castShadow = true;
blower.add(trig);

// ── BLOWER TUBE ────────────────────────────────
const t1Geo = new THREE.CylinderGeometry(0.085, 0.09, 0.8, 48);
const t1 = new THREE.Mesh(t1Geo, MB);
t1.position.set(0, 0.06, 0.7); t1.castShadow = true;
blower.add(t1);

const t2Geo = new THREE.CylinderGeometry(0.075, 0.08, 0.8, 48);
const t2 = new THREE.Mesh(t2Geo, MB);
t2.position.set(0, 0.04, 1.5); t2.castShadow = true;
blower.add(t2);

// Tube connector ring
const trGeo = new THREE.TorusGeometry(0.085, 0.014, 12, 48);
const tr = new THREE.Mesh(trGeo, MMD);
tr.position.set(0, 0.05, 1.1); tr.castShadow = true;
blower.add(tr);

// ── NOZZLE (flared) ────────────────────────────
const nzGeo = latheShape([
  [0.065, 0], [0.07, 0.04], [0.085, 0.08], [0.10, 0.14], [0.105, 0.18], [0.105, 0.22], [0.10, 0.22]
], 48);
const nz = new THREE.Mesh(nzGeo, MBR);
nz.position.set(0, 0.02, 2.02); nz.castShadow = true;
blower.add(nz);

const nzTipGeo = new THREE.TorusGeometry(0.105, 0.016, 12, 48);
const nzTip = new THREE.Mesh(nzTipGeo, MMD);
nzTip.position.set(0, 0.02, 2.13); nzTip.castShadow = true;
blower.add(nzTip);

// ── BASE FEET ──────────────────────────────────
const footGeo = roundedBox(0.1, 0.04, 0.26, 0.012, 3);
const foot = new THREE.Mesh(footGeo, MBR);
foot.position.set(0, -0.04, -0.1); foot.castShadow = true; foot.receiveShadow = true;
blower.add(foot);

const bumpGeo = new THREE.CylinderGeometry(0.035, 0.042, 0.05, 24);
const bump = new THREE.Mesh(bumpGeo, MBR);
bump.position.set(0, -0.06, 0.22); bump.castShadow = true;
blower.add(bump);

// ── FLANGE ─────────────────────────────────────
const flangeGeo = latheShape([
  [0.14, 0], [0.17, 0.01], [0.18, 0.04], [0.17, 0.08], [0.14, 0.08]
], 48);
const flange = new THREE.Mesh(flangeGeo, MOD);
flange.position.set(0, 0.08, 0.3);
blower.add(flange);

// ── BADGE ──────────────────────────────────────
const badgeGeo = roundedBox(0.26, 0.05, 0.005, 0.002, 2);
const badge = new THREE.Mesh(badgeGeo, MM);
badge.position.set(0.26, 0.48, 0.29); badge.castShadow = true;
blower.add(badge);

scene.add(blower);

/* ================================================================
   ANIMATION
   ================================================================ */
function anim() { requestAnimationFrame(anim); ctrl.update(); R.render(scene, cam); }
anim();

/* ================================================================
   UI
   ================================================================ */
const ba = document.getElementById('ba'), rhEl = document.getElementById('rh');
ba.addEventListener('click', () => { ctrl.autoRotate = !ctrl.autoRotate; ba.classList.toggle('on', ctrl.autoRotate); });
let hDone = false;
function hideH() { if (!hDone) { hDone = true; rhEl.style.opacity = '0'; setTimeout(() => rhEl.remove(), 600); } }
C.addEventListener('pointerdown', hideH); C.addEventListener('wheel', hideH);

function animCam(pos, tgt, dur = 800) {
  const sp = cam.position.clone(), st = ctrl.target.clone();
  const ep = new THREE.Vector3(...pos), et = new THREE.Vector3(...tgt), t0 = performance.now();
  (function s(t) { const e = Math.min((t - t0) / dur, 1), ee = e < .5 ? 2*e*e : -1 + (4 - 2*e)*e; cam.position.lerpVectors(sp, ep, ee); ctrl.target.lerpVectors(st, et, ee); ctrl.update(); if (e < 1) requestAnimationFrame(s); })(t0);
}

document.getElementById('bf').addEventListener('click', () => animCam([0, 0.4, 4.4], [0, 0.3, 0.8]));
document.getElementById('bs').addEventListener('click', () => animCam([3.8, 0.4, 0.5], [0, 0.3, 0.6]));
document.getElementById('bt').addEventListener('click', () => animCam([0, 4.8, 0.6], [0, 0.3, 0.6]));
document.getElementById('br').addEventListener('click', () => animCam([2.4, 1.2, 3.6], [0, 0.25, 0.6]));

addEventListener('keydown', e => { switch (e.key.toLowerCase()) { case 'f': document.getElementById('bf').click(); break; case 's': document.getElementById('bs').click(); break; case 't': document.getElementById('bt').click(); break; case 'r': document.getElementById('br').click(); break; case ' ': e.preventDefault(); ba.click(); break; } });
addEventListener('resize', () => { cam.aspect = innerWidth / innerHeight; cam.updateProjectionMatrix(); R.setSize(innerWidth, innerHeight); });
C.addEventListener('touchstart', () => C.classList.add('grabbing'), { passive: true });
C.addEventListener('touchend', () => C.classList.remove('grabbing'), { passive: true });

console.log('🌿 吹风机 3D — ExtrudeGeometry + LatheGeometry + TubeGeometry 建模');
